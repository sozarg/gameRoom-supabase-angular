<nav class="navbar">
    <div class="nav-left">
        <button class="menu-toggle" (click)="toggleMenu()" [attr.aria-label]="'nav.open_menu' | translate">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>

        <div class="nav-links" [class.open]="isMenuOpen()">
            <a class="nav-chip nav-link-chip" routerLink="/home" routerLinkActive="active" (click)="closeMenu()">{{ 'nav.home' | translate }}</a>
            <a class="nav-chip nav-link-chip" routerLink="/resultados" routerLinkActive="active" (click)="closeMenu()">{{ 'nav.results' | translate }}</a>
            <a class="nav-chip nav-link-chip" routerLink="/about-me" routerLinkActive="active" (click)="closeMenu()">{{ 'nav.about' | translate }}</a>
        </div>
    </div>

    <div class="nav-right auth-actions">
        <div class="nav-chip nav-user-chip" style="display:flex;gap:.35rem;align-items:center;">
          <span>{{ 'nav.language' | translate }}:</span>
          <button type="button" class="nav-action nav-action-secondary" [class.active]="currentLang==='es'" (click)="setLanguage('es')">ES</button>
          <button type="button" class="nav-action nav-action-secondary" [class.active]="currentLang==='en'" (click)="setLanguage('en')">EN</button>
        </div>

        <ng-container *ngIf="user$ | async as user; else guestActions">
            <span class="nav-chip nav-user-chip" *ngIf="user.user_metadata?.firstName">
                {{ user.user_metadata?.firstName }}
            </span>
            <button (click)="logout()" class="nav-action nav-action-secondary">{{ 'nav.logout' | translate }}</button>
        </ng-container>

        <ng-template #guestActions>
            <a routerLink="/login" routerLinkActive="active" class="nav-action nav-action-primary" (click)="closeMenu()">{{ 'nav.login' | translate }}</a>
            <a routerLink="/register" routerLinkActive="active" class="nav-action nav-action-secondary" (click)="closeMenu()">{{ 'nav.register' | translate }}</a>
        </ng-template>
    </div>
</nav>
