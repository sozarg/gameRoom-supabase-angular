<div class="auth-page">
  <div class="auth-card neo-card">
    <div class="text-center mb-8">
      <h1 class="progra-title !mb-2">{{ 'auth.register_title' | translate }}</h1>
      <p class="progra-text text-sm">{{ 'auth.register_subtitle' | translate }}</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onRegister()" class="space-y-4">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-[var(--ink-soft)] mb-1">{{ 'auth.first_name' | translate }}</label>
          <input type="text" formControlName="firstName" class="progra-input py-2" [placeholder]="'auth.first_name' | translate">
        </div>
        <div>
          <label class="block text-sm font-medium text-[var(--ink-soft)] mb-1">{{ 'auth.last_name' | translate }}</label>
          <input type="text" formControlName="lastName" class="progra-input py-2" [placeholder]="'auth.last_name' | translate">
        </div>
      </div>

      <div class="grid grid-cols-3 gap-4">
        <div class="col-span-1">
          <label class="block text-sm font-medium text-[var(--ink-soft)] mb-1">{{ 'auth.age' | translate }}</label>
          <input type="number" formControlName="age" class="progra-input py-2" [placeholder]="'auth.age' | translate">
        </div>
        <div class="col-span-2">
          <label class="block text-sm font-medium text-[var(--ink-soft)] mb-1">{{ 'auth.email' | translate }}</label>
          <input type="email" formControlName="email" class="progra-input py-2" placeholder="example@mail.com">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-[var(--ink-soft)] mb-1">{{ 'auth.password' | translate }}</label>
        <input type="password" formControlName="password" class="progra-input py-2" [placeholder]="'auth.password_min' | translate">
      </div>

      <button type="submit" appInteraction class="progra-btn progra-btn-primary w-full py-3 flex items-center justify-center">
        <span *ngIf="!loading">{{ 'auth.register_btn' | translate }}</span>
        <span *ngIf="loading" class="animate-pulse">{{ 'auth.processing' | translate }}</span>
      </button>
    </form>

    <div *ngIf="showModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/25 px-4" (click)="closeModal()">
      <div class="neo-card w-full max-w-sm p-6" (click)="$event.stopPropagation()">
        <h2 class="text-lg font-bold text-[var(--ink)] mb-2">{{ 'auth.error_title' | translate }}</h2>
        <p class="text-sm text-[var(--ink-soft)]">{{ modalMessage }}</p>
        <div class="mt-5 flex justify-end">
          <button type="button" class="progra-btn progra-btn-primary" (click)="closeModal()">{{ 'common.close' | translate }}</button>
        </div>
      </div>
    </div>

    <div class="mt-8 pt-6 border-t-2 border-[var(--line)] text-center">
      <p class="progra-text text-sm mb-4">
        {{ 'auth.have_account' | translate }}
        <a routerLink="/login" class="text-[var(--ink)] font-semibold underline">{{ 'auth.login_here' | translate }}</a>
      </p>
      <div class="flex justify-center">
        <img src="logo.png" alt="Logo" class="w-16 h-16 object-contain opacity-90">
      </div>
    </div>
  </div>
</div>
